#   Use PRINT_START for the slicer starting script - please customise for your slicer of choice
[gcode_macro PRINT_START]
gcode:
    G90							       # Benutze absolute Koordinaten
	G32							       # Home all & QGL
	CLEAN_NOZZLE				       # Reinige die Düse
	CALIBRATE_Z					       # Kalibriere Z-Offset
    SET_Z_THERMAL_ADJUST ref_temp=24   # Setze Referenz Temperatur für Thermal Z Compensation
    STATUS_PRINTING                    # Setze den Status der SB-Leds
    BED_MESH_CALIBRATE                 # Erstelle Bed-mesh
    G1 E14.5 F3000                     # Extrudiere 14.5mm Filament
