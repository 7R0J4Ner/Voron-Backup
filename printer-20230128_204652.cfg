[mcu]
##  Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
##--------------------------------------------------------------------
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_280013000350534E4E303720-if00
restart_method: command
##--------------------------------------------------------------------

[printer]
kinematics: corexy
max_velocity: 300  
max_accel: 4000             #Max 4000
max_z_velocity: 15          #Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0

#####################################################################
#   X/Y Stepper Settings
#####################################################################

##  B Stepper - Left
##  Connected to MOTOR_0
##  Endstop connected to DIAG_0
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
rotation_distance: 40
microsteps: 32
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin: !PG6
position_min: 0
position_endstop: 350
position_max: 350
homing_speed: 100   #Max 100
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PC4
interpolate: false
run_current: 1.1
sense_resistor: 0.110
stealthchop_threshold: 0

##  A Stepper - Right
##  Connected to MOTOR_1
##  Endstop connected to DIAG_1
[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
rotation_distance: 40
microsteps: 32
full_steps_per_rotation:200
endstop_pin: !PG9
position_min: 0
position_endstop: 358
position_max: 359
homing_speed: 100  #Max 100
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PD11
interpolate: false
run_current: 1.1
sense_resistor: 0.110
stealthchop_threshold: 0
 
#####################################################################
#   Z Stepper Settings
#####################################################################

## Z0 Stepper - Front Left
##  Connected to MOTOR_2
##  Endstop connected to DIAG_2
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
endstop_pin: PG10
##  Z-position of nozzle (in mm) to z-endstop trigger point relative to print surface (Z0)
##  (+) value = endstop above Z0, (-) value = endstop below
##  Increasing position_endstop brings nozzle closer to the bed
##  After you run Z_ENDSTOP_CALIBRATE, position_endstop will be stored at the very end of your config
#position_endstop: -0.5

position_max: 310
position_min: -8
homing_speed: 30
second_homing_speed: 3
homing_retract_dist: 3

[tmc2209 stepper_z]
uart_pin: PC6
interpolate: false
run_current: 1.1
sense_resistor: 0.110
stealthchop_threshold: 0

##  Z1 Stepper - Rear Left
##  Connected to MOTOR_3
[stepper_z1]
step_pin: PG4
dir_pin: !PC1
enable_pin: !PA0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z1]
uart_pin: PC7
interpolate: false
run_current: 1.1
sense_resistor: 0.110
stealthchop_threshold: 0

##  Z2 Stepper - Rear Right
##  Connected to MOTOR_4
[stepper_z2]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z2]
uart_pin: PF2
interpolate: false
run_current: 1.1
sense_resistor: 0.110
stealthchop_threshold: 0

##  Z3 Stepper - Front Right
##  Connected to MOTOR_5
[stepper_z3]
step_pin: PC13
dir_pin: !PF0
enable_pin: !PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z3]
uart_pin: PE4
interpolate: false
run_current: 1.1
sense_resistor: 0.110
stealthchop_threshold: 0


#####################################################################
#   Extruder
#####################################################################

##  Connected to MOTOR_6
##  Heater - HE0
##  Thermistor - T0
[extruder]
step_pin: PE2
dir_pin: !PE3
enable_pin: !PD4

##  Update value below when you perform extruder calibration
##  If you ask for 100mm of filament, but in reality it is 98mm:
##  rotation_distance = <previous_rotation_distance> * <actual_extrude_distance> / 100
rotation_distance: 22.330   #Bondtech 5mm Drive Gears
gear_ratio: 50:10              #Stealthburner/Clockwork 2
microsteps: 32
full_steps_per_rotation: 200    #200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.75

heater_pin: PA2
sensor_type: Generic 3950
sensor_pin: PF4
min_temp: 10
max_temp: 270
max_power: 1.0
min_extrude_temp: 170
#control = pid
#pid_kp = 26.213
#pid_ki = 1.304
#pid_kd = 131.721

##  Try to keep pressure_advance below 1.0
#pressure_advance: 0.05
##  Default is 0.040, leave stock
#pressure_advance_smooth_time: 0.040

##  E0 on MOTOR6
[tmc2209 extruder]
uart_pin: PE1
interpolate: false
run_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 0


#####################################################################
#   Bed Heater
#####################################################################
##  SSR Pin - HE1
##  Thermistor - NTC1000
[heater_bed]
heater_pin: PA3
sensor_type: Generic 3950
sensor_pin: PF3
max_power: 0.5                ##  Adjust Max Power so your heater doesn't warp your bed. Rule of thumb is 0.4 watts / cm^2 .
min_temp: 0
max_temp: 120
#control: pid
#pid_kp: 58.437
#pid_ki: 2.347
#pid_kd: 363.769


#####################################################################
#   Probe
#####################################################################
##  This probe is not used for Z height, only Quad Gantry Leveling
[probe]
pin: PG15
x_offset: 0
y_offset: 19.75
z_offset: 6.42
speed: 5
samples: 3
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.01
samples_tolerance_retries: 3


#####################################################################
#   Bed-Mesh
#####################################################################
[bed_mesh]
speed: 300
horizontal_move_z: 15
mesh_min: 40, 40
mesh_max: 310,310
fade_start: 0.6
fade_end: 10.0
probe_count: 5,5
algorithm: bicubic
relative_reference_index: 12


#####################################################################
#   Bauraum Temperatur
#####################################################################
[temperature_sensor Bauraum]
sensor_type: Generic 3950
sensor_pin: PF6
min_temp: 0
max_temp: 100


#####################################################################
#   MCU & PI Temperaturen
#####################################################################
[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[temperature_sensor Octopus]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor tmc2209_extruder]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

#####################################################################
#   Lüftersteuerung
#####################################################################

##  Bautail-Lüfter - FAN0
[fan]
pin: PA8
kick_start_time: 0.5       ##  Depending on your fan, you may need to increase this value if your fan will not start. You can change cycle_time (increase) if your fan is not able to slow down effectively
off_below: 0.10

##  Hotend Lüfter - FAN1
[heater_fan hotend_Lüfter]
pin: PE5
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0
#fan_speed: 1.0           ##  If you are experiencing back flow, you can reduce fan_speed

##  Controller Lüfter - FAN2
[controller_fan Elektronik_Lüfter]
pin: PD12
kick_start_time: 1.4
fan_speed: 0.6
idle_speed: 0.25
idle_timeout: 30
heater: heater_bed


##  Nevermore - FAN3
[fan_generic Nevermore]         ##  Steuerung via Makro
pin: PD13
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 1.5


##  Abluft - FAN4
#[heater_fan Abluft]
#pin: PD14
#max_power: 1.0
#shutdown_speed: 0.0
#kick_start_time: 5.0
#heater: heater_bed
#heater_temp: 60
#fan_speed: 1.0


#####################################################################
#   Homing and Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 600        #  In Sekunden (10min)
gcode:
  TURN_OFF_HEATERS
  M84

##Ausgekapselt wegen Klicky-safe_z_home macro
#[safe_z_home]     ##  XY Location of the Z Endstop Switch
#home_xy_position:230,362
#speed:100
#z_hop:20

[quad_gantry_level]
gantry_corners:
   -60,-10
   410,420
   
##  Probe points
points:
   50,25
   50,275
   300,275
   300,25
   
speed: 300
horizontal_move_z: 15
retries: 5
retry_tolerance: 0.0075
max_adjust: 10


#####################################################################
#   Mainsail spezifisch
#####################################################################

[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos  : True    # use custom park coordinates for x,y [True/False] 
variable_custom_park_x   : 175.0   # custom x position; value must be within your defined min and max of X
variable_custom_park_y   : 109.0   # custom y position; value must be within your defined min and max of Y
variable_custom_park_dz  : 10.0    # custom dz value; the value in mm to lift the nozzle when move to park position 
variable_retract         : 15.0    # the value to retract while PAUSE
variable_cancel_retract  : 15.0    # the value to retract while CANCEL_PRINT
variable_speed_retract   : 35.0    # retract speed in mm/s
variable_unretract       : 15.0    # the value to unretract while RESUME
variable_speed_unretract : 35.0    # unretract speed in mm/s
variable_speed_hop       : 15.0    # z move speed in mm/s
variable_speed_move      : 100.0   # move speed in mm/s
variable_park_at_cancel  : False    # allow to move the toolhead to park while execute CANCEL_PRINT [True,False]

variable_use_fw_retract  : False   # use fw_retraction instead of the manual version [True/False] !!! Caution [firmware_retraction] must be defined in the printer.cfg if you set use_fw_retract: True !!!
gcode:


#####################################################################
#   Misc
#####################################################################	
	
[include mainsail.cfg]
[include neopixel.cfg]
[include autoz.cfg]
#[include pis.cfg]         ##  Aktivieren für Inputshaping / Deaktivieren wenn nicht Angeschlossen!
[include Macros/*.cfg]
[include Klicky/*.cfg]


#GitHub Backup
[gcode_shell_command backup_to_github]
command: sh /home/pi/backup.sh
timeout: 30.
verbose: True

[gcode_macro GITHUB_BACKUP]
gcode:
    RUN_SHELL_COMMAND CMD=backup_to_github

